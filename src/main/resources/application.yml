spring:
  application:
    name: RIS_valanter
  datasource:
    url: jdbc:postgresql://localhost:5432/RIS_valanter
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    # БД уже не пустая, но нет flyway_schema_history — иначе Flyway падает при старте
    baseline-on-migrate: true
    # 0 = после baseline всё ещё выполнится V1__init_schema.sql
    baseline-version: 0

# Секрет JWT: в продакшене задавать через переменные окружения
app:
  jwt:
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    expiration-ms: 86400000

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: warn
